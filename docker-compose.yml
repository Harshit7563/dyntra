services:
  postgres:
    image: postgres:16-alpine
    container_name: dyntra-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dyntra
      POSTGRES_PASSWORD: dyntra123
      POSTGRES_DB: dyntra
    ports:
      - "5432:5432"
    volumes:
      - dyntra_pgdata:/var/lib/postgresql/data

volumes:
  dyntra_pgdata:
